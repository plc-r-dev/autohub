version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: autohub-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: autohub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: autohub-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4

    container_name: autohub-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autohub.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

volumes:
  postgres_data: